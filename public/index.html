<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube to MP3</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1115;
        --panel: #171a21;
        --text: #eef1f6;
        --muted: #9aa3b2;
        --accent: #ff3b30;
        --accent-hover: #ff6259;
        --border: #2a3140;
        --success: #34c759;
        --error: #ff453a;
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f6fb;
          --panel: #ffffff;
          --text: #111827;
          --muted: #6b7280;
          --border: #e5e7eb;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 59, 48, 0.12), transparent 40%),
          var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(560px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.6rem;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        font-size: 0.9rem;
        font-weight: 600;
      }

      input[type="url"] {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-size: 1rem;
      }

      input[type="url"]:focus {
        outline: 2px solid rgba(255, 59, 48, 0.35);
        border-color: var(--accent);
      }

      button {
        border: 0;
        border-radius: 12px;
        padding: 14px 18px;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        background: var(--accent);
        cursor: pointer;
        transition: background 0.15s ease;
      }

      button:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 20px;
        display: none;
      }

      .status.visible {
        display: block;
      }

      .progress-wrap {
        margin-top: 8px;
        height: 12px;
        background: rgba(127, 127, 127, 0.18);
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff3b30, #ff9500);
        transition: width 0.2s ease;
      }

      .status-text {
        margin-top: 10px;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .result {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(52, 199, 89, 0.12);
        border: 1px solid rgba(52, 199, 89, 0.25);
        display: none;
      }

      .result.visible {
        display: block;
      }

      .result strong {
        display: block;
        margin-bottom: 4px;
      }

      .error {
        margin-top: 16px;
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(255, 69, 58, 0.12);
        border: 1px solid rgba(255, 69, 58, 0.25);
        color: var(--error);
        display: none;
      }

      .error.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>YouTube to MP3</h1>
      <p>Paste a YouTube link to download 320 kbps MP3 audio to your Desktop.</p>

      <form id="download-form">
        <label for="url">YouTube URL</label>
        <input
          id="url"
          name="url"
          type="url"
          placeholder="https://www.youtube.com/watch?v=..."
          required
          autocomplete="off"
        />
        <button type="submit" id="submit-btn">Download MP3</button>
      </form>

      <section class="status" id="status" aria-live="polite">
        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="status-text" id="status-text">Preparing...</div>
      </section>

      <div class="result" id="result"></div>
      <div class="error" id="error"></div>
    </main>

    <script>
      const form = document.getElementById("download-form");
      const urlInput = document.getElementById("url");
      const submitBtn = document.getElementById("submit-btn");
      const status = document.getElementById("status");
      const progressBar = document.getElementById("progress-bar");
      const statusText = document.getElementById("status-text");
      const result = document.getElementById("result");
      const errorBox = document.getElementById("error");

      let activeSource = null;

      function resetUi() {
        status.classList.remove("visible");
        result.classList.remove("visible");
        errorBox.classList.remove("visible");
        progressBar.style.width = "0%";
        statusText.textContent = "Preparing...";
        result.textContent = "";
        errorBox.textContent = "";
      }

      function setProgress(percent, message) {
        status.classList.add("visible");
        progressBar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
        statusText.textContent = message;
      }

      function phaseLabel(phase) {
        switch (phase) {
          case "starting":
            return "Starting";
          case "download":
            return "Downloading";
          case "extract":
            return "Converting to MP3";
          case "done":
            return "Done";
          default:
            return "Working";
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const url = urlInput.value.trim();
        if (!url) return;

        if (activeSource) {
          activeSource.close();
          activeSource = null;
        }

        resetUi();
        submitBtn.disabled = true;

        const source = new EventSource(
          `/api/download?url=${encodeURIComponent(url)}`,
        );
        activeSource = source;

        source.addEventListener("progress", (event) => {
          const data = JSON.parse(event.data);
          const label = phaseLabel(data.phase);
          const percent =
            data.phase === "extract"
              ? 100
              : typeof data.percent === "number"
                ? data.percent
                : 0;
          const detail = data.message ? ` — ${data.message}` : "";
          setProgress(percent, `${label}${detail}`);
        });

        source.addEventListener("complete", (event) => {
          const data = JSON.parse(event.data);
          setProgress(100, "Saved to Desktop");
          result.innerHTML = `<strong>${data.title}</strong>${data.fileName}`;
          result.classList.add("visible");
          source.close();
          activeSource = null;
          submitBtn.disabled = false;
        });

        source.addEventListener("error", (event) => {
          if (event.data) {
            const data = JSON.parse(event.data);
            errorBox.textContent = data.message || "Download failed.";
          } else {
            errorBox.textContent = "Connection lost. Please try again.";
          }
          errorBox.classList.add("visible");
          source.close();
          activeSource = null;
          submitBtn.disabled = false;
        });
      });
    </script>
  </body>
</html>
