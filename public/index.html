<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Downloader</title>
    <style>
      :root {
        color-scheme: dark;

        --bg: #0f1115;
        --panel: #171a21;
        --text: #eef1f6;
        --muted: #9aa3b2;
        --placeholder: rgba(154, 163, 178, 0.45);
        --accent: #ff3b30;
        --accent-hover: #ff6259;
        --accent-all: color-mix(in srgb, var(--accent) 68%, white 32%);
        --accent-all-hover: color-mix(in srgb, var(--accent-hover) 58%, white 42%);
        --border: #2a3140;
        --success: #34c759;
        --error: #ff453a;
        --bg-glow: rgba(255, 59, 48, 0.12);
        --panel-shadow-color: rgba(0, 0, 0, 0.18);
        --input-focus-ring: rgba(255, 59, 48, 0.35);
        --progress-start: #ff3b30;
        --progress-end: #ff9500;
        --skin-bar-bg: rgba(255, 255, 255, 0.03);
        --skin-option-bg: rgba(255, 255, 255, 0.04);
        --skin-option-active: rgba(255, 59, 48, 0.18);
        --result-bg: rgba(52, 199, 89, 0.12);
        --result-border: rgba(52, 199, 89, 0.25);
        --error-bg: rgba(255, 69, 58, 0.12);
        --error-border: rgba(255, 69, 58, 0.25);
        --scrollbar-thumb: rgba(127, 127, 127, 0.35);
        --cycle-color: var(--text);
        --cycle-active-color: var(--accent);

        --body-glow-opacity: 1;
        --panel-opacity: 1;
        --banner-opacity: 1;
        --banner-overlay-opacity: 0;
        --skin-bar-opacity: 1;
        --skin-row-opacity: 1;
        --heading-opacity: 1;
        --subtitle-opacity: 1;
        --form-opacity: 1;
        --input-opacity: 1;
        --input-placeholder-opacity: 1;
        --button-opacity: 1;
        --skin-option-opacity: 1;
        --progress-track-opacity: 1;
        --result-opacity: 1;
        --error-opacity: 1;

        --panel-blur: 0px;
        --skin-bar-blur: 0px;
        --skin-row-blur: 0px;
        --form-blur: 0px;
        --input-blur: 0px;
        --banner-blur: 0px;
        --result-blur: 0px;
        --error-blur: 0px;

        --banner-saturate: 100%;
        --banner-contrast: 100%;
        --banner-brightness: 100%;
        --panel-saturate: 100%;
        --panel-contrast: 100%;

        --body-blend-mode: normal;
        --panel-blend-mode: normal;
        --banner-blend-mode: normal;
        --banner-overlay-blend-mode: normal;
        --skin-bar-blend-mode: normal;
        --form-blend-mode: normal;

        --banner-display: none;
        --banner-image: none;
        --banner-size: cover;
        --banner-position: center;
        --banner-aspect-ratio: 21 / 9;
        --banner-min-height: 0px;
        --banner-max-height: none;
        --banner-overlay-display: none;
        --banner-overlay-color: rgba(0, 0, 0, 0.45);

        --main-padding: 28px;
        --main-radius: 20px;
        --main-max-width: 560px;
        --skin-bar-margin: calc(-1 * var(--main-padding)) calc(-1 * var(--main-padding)) 24px;
        --skin-bar-padding: 14px 16px;
        --content-padding-x: 0px;
        --heading-align: left;
        --subtitle-align: left;

        --radius-button: 12px;
        --radius-input: 12px;
        --radius-form: 0px;
        --radius-skin-option: 14px;
        --radius-skin-cycle: 14px;
        --radius-progress: 999px;

        --font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
        --heading-size: 1.6rem;
        --heading-weight: 700;
        --heading-spacing: normal;
        --heading-transform: none;
        --label-size: 0.9rem;
        --label-weight: 600;
        --label-spacing: normal;
        --label-transform: none;

        --panel-shadow-y: 20px;
        --panel-shadow-blur: 60px;
        --panel-inset-glow: transparent;
        --button-shadow: none;
        --button-all-shadow: none;
        --input-shadow: none;
        --input-focus-shadow: none;
        --progress-glow: none;
        --heading-shadow: none;
        --transition-speed: 0.15s;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-family);
        background:
          radial-gradient(
            circle at top,
            color-mix(in srgb, var(--bg-glow) calc(var(--body-glow-opacity) * 100%), transparent),
            transparent 40%
          ),
          var(--bg);
        background-blend-mode: var(--body-blend-mode);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(var(--main-max-width), 100%);
        background: color-mix(in srgb, var(--panel) calc(var(--panel-opacity) * 100%), transparent);
        border: 1px solid var(--border);
        border-radius: var(--main-radius);
        padding: var(--main-padding);
        box-shadow:
          0 var(--panel-shadow-y) var(--panel-shadow-blur) var(--panel-shadow-color),
          0 0 0 1px var(--panel-inset-glow) inset;
        backdrop-filter: blur(var(--panel-blur)) saturate(var(--panel-saturate))
          contrast(var(--panel-contrast));
        -webkit-backdrop-filter: blur(var(--panel-blur)) saturate(var(--panel-saturate))
          contrast(var(--panel-contrast));
        mix-blend-mode: var(--panel-blend-mode);
        overflow: hidden;
      }

      .scene-banner {
        display: var(--banner-display);
        position: relative;
        width: calc(100% + (2 * var(--main-padding)));
        margin: calc(-1 * var(--main-padding)) calc(-1 * var(--main-padding)) 0;
        aspect-ratio: var(--banner-aspect-ratio);
        min-height: var(--banner-min-height);
        max-height: var(--banner-max-height);
        /* background-image is set by skins.js (url() in CSS vars resolves to the page, not the skin) */
        background-size: var(--banner-size);
        background-position: var(--banner-position);
        background-repeat: no-repeat;
        opacity: var(--banner-opacity);
        filter: blur(var(--banner-blur)) saturate(var(--banner-saturate))
          contrast(var(--banner-contrast)) brightness(var(--banner-brightness));
        mix-blend-mode: var(--banner-blend-mode);
      }

      .scene-banner::after {
        content: "";
        display: var(--banner-overlay-display);
        position: absolute;
        inset: 0;
        background: var(--banner-overlay-color);
        opacity: var(--banner-overlay-opacity);
        mix-blend-mode: var(--banner-overlay-blend-mode);
        pointer-events: none;
      }

      .skin-bar {
        margin: var(--skin-bar-margin);
        padding: var(--skin-bar-padding);
        background: color-mix(
          in srgb,
          var(--skin-bar-bg) calc(var(--skin-bar-opacity) * 100%),
          transparent
        );
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(var(--skin-bar-blur));
        -webkit-backdrop-filter: blur(var(--skin-bar-blur));
        mix-blend-mode: var(--skin-bar-blend-mode);
      }

      .skin-bar-row {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 0;
        background: transparent;
        opacity: var(--skin-row-opacity);
        backdrop-filter: blur(var(--skin-row-blur));
        -webkit-backdrop-filter: blur(var(--skin-row-blur));
      }

      .skin-controls {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 68px;
        height: 68px;
      }

      .skin-control {
        flex: 1;
        min-height: 0;
        padding: 0 6px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: color-mix(
          in srgb,
          var(--skin-option-bg) calc(var(--skin-option-opacity) * 100%),
          transparent
        );
        color: var(--cycle-color);
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1;
        display: grid;
        place-items: center;
      }

      .skin-control:hover:not(:disabled) {
        background: var(--skin-option-active);
      }

      .skin-control.active {
        border-color: var(--accent);
        background: var(--skin-option-active);
        color: var(--cycle-active-color);
      }

      .skin-control:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .skin-cycle {
        border-radius: var(--radius-skin-cycle);
      }

      .skin-fav-filter {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .skin-fav-filter.active {
        color: var(--accent);
      }

      .skin-scroll {
        flex: 1;
        min-width: 0;
        display: flex;
        gap: 10px;
        align-items: center;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: thin;
        min-height: 68px;
      }

      .skin-scroll-empty {
        margin: 0;
        padding: 0 8px;
        color: var(--muted);
        font-size: 0.78rem;
        white-space: nowrap;
      }

      .skin-scroll::-webkit-scrollbar {
        height: 6px;
      }

      .skin-scroll::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 999px;
      }

      .skin-option {
        position: relative;
        flex: 0 0 auto;
        width: auto;
        padding: 8px;
        border-radius: var(--radius-skin-option);
        border: 1px solid var(--border);
        background: color-mix(
          in srgb,
          var(--skin-option-bg) calc(var(--skin-option-opacity) * 100%),
          transparent
        );
        color: var(--text);
      }

      .skin-bar button {
        margin: 0;
        font: inherit;
      }

      .skin-option-select {
        display: grid;
        place-items: center;
        padding: 0;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: inherit;
        box-shadow: none;
      }

      .skin-option:hover {
        background: var(--skin-option-active);
      }

      .skin-option.active {
        border-color: var(--accent);
        background: var(--skin-option-active);
      }

      .skin-fav-toggle {
        position: absolute;
        top: 3px;
        right: 3px;
        width: 18px;
        height: 18px;
        padding: 0;
        border: 0;
        border-radius: 4px;
        background: color-mix(in srgb, var(--bg) 72%, transparent);
        color: var(--muted);
        font-size: 0.7rem;
        line-height: 1;
        opacity: 0;
        box-shadow: none;
        transition: opacity 0.15s ease;
      }

      .skin-fav-toggle:hover:not(:disabled) {
        color: var(--accent);
        background: color-mix(in srgb, var(--bg) 82%, transparent);
      }

      .skin-fav-toggle.favorited {
        opacity: 1;
        color: var(--accent);
      }

      .skin-option:hover .skin-fav-toggle,
      .skin-option.is-favorite .skin-fav-toggle {
        opacity: 1;
      }

      .skin-option-emoji {
        font-size: 1.35rem;
        line-height: 1;
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
      }

      .skin-option-thumb {
        width: 52px;
        height: 52px;
        border-radius: 8px;
        flex-shrink: 0;
      }

      .skin-option-banner {
        display: block;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .skin-option-thumb:not(.skin-option-banner) {
        object-fit: cover;
        object-position: center;
      }

      h1 {
        margin: 0 0 8px;
        padding: 0 var(--content-padding-x);
        font-size: var(--heading-size);
        font-weight: var(--heading-weight);
        letter-spacing: var(--heading-spacing);
        text-transform: var(--heading-transform);
        text-align: var(--heading-align);
        opacity: var(--heading-opacity);
        text-shadow: var(--heading-shadow);
      }

      p {
        margin: 0 0 24px;
        padding: 0 var(--content-padding-x);
        color: var(--muted);
        line-height: 1.5;
        text-align: var(--subtitle-align);
        opacity: var(--subtitle-opacity);
      }

      form {
        display: grid;
        gap: 12px;
        margin: 0 var(--content-padding-x);
        padding: 0;
        border-radius: var(--radius-form);
        background: color-mix(
          in srgb,
          var(--panel) calc(var(--form-opacity) * 100%),
          transparent
        );
        backdrop-filter: blur(var(--form-blur));
        -webkit-backdrop-filter: blur(var(--form-blur));
        mix-blend-mode: var(--form-blend-mode);
      }

      label {
        font-size: var(--label-size);
        font-weight: var(--label-weight);
        letter-spacing: var(--label-spacing);
        text-transform: var(--label-transform);
      }

      .url-field {
        position: relative;
        width: 100%;
      }

      .url-field input {
        box-sizing: border-box;
        width: 100%;
        padding: 14px 44px 14px 16px;
        border-radius: var(--radius-input);
        border: 1px solid var(--border);
        background: color-mix(
          in srgb,
          var(--panel) calc(var(--input-opacity) * 100%),
          transparent
        );
        color: var(--text);
        font-size: 1rem;
        box-shadow: var(--input-shadow);
        backdrop-filter: blur(var(--input-blur));
        -webkit-backdrop-filter: blur(var(--input-blur));
      }

      .url-clear {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        padding: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font-size: 1.1rem;
        line-height: 1;
        display: none;
      }

      .url-clear.visible {
        display: block;
      }

      .url-clear:hover:not(:disabled) {
        background: rgba(127, 127, 127, 0.18);
        color: var(--text);
      }

      .url-field input::placeholder {
        color: var(--placeholder);
        opacity: var(--input-placeholder-opacity);
      }

      .url-field input:focus {
        outline: 2px solid var(--input-focus-ring);
        border-color: var(--accent);
        box-shadow: var(--input-focus-shadow);
      }

      form button {
        border: 0;
        border-radius: var(--radius-button);
        padding: 14px 18px;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        background: var(--accent);
        cursor: pointer;
        opacity: var(--button-opacity);
        box-shadow: var(--button-shadow);
        transition: background var(--transition-speed) ease;
      }

      form button:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      form button:disabled {
        opacity: calc(var(--button-opacity) * 0.6);
        cursor: not-allowed;
      }

      form button.all {
        background: var(--accent-all);
        box-shadow: var(--button-all-shadow);
      }

      form button.all:hover:not(:disabled) {
        background: var(--accent-all-hover);
      }

      .skin-bar .skin-control,
      .skin-bar .skin-option-select,
      .skin-bar .skin-fav-toggle {
        cursor: pointer;
      }

      .status {
        margin: 20px var(--content-padding-x) 0;
      }

      .status.visible {
        display: block;
      }

      .status:not(.visible) {
        display: none;
      }

      .progress-wrap {
        margin-top: 8px;
        height: 12px;
        background: color-mix(
          in srgb,
          rgba(127, 127, 127, 0.18) calc(var(--progress-track-opacity) * 100%),
          transparent
        );
        border-radius: var(--radius-progress);
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--progress-start), var(--progress-end));
        box-shadow: var(--progress-glow);
        transition: width 0.2s ease;
      }

      .status-text {
        margin-top: 10px;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .result {
        margin: 16px var(--content-padding-x) 0;
        padding: 14px 16px;
        border-radius: 12px;
        background: color-mix(
          in srgb,
          var(--result-bg) calc(var(--result-opacity) * 100%),
          transparent
        );
        border: 1px solid var(--result-border);
        backdrop-filter: blur(var(--result-blur));
        -webkit-backdrop-filter: blur(var(--result-blur));
        display: none;
      }

      .result.visible {
        display: block;
      }

      .result strong {
        display: block;
        margin-bottom: 4px;
      }

      .error {
        margin: 16px var(--content-padding-x) 0;
        padding: 14px 16px;
        border-radius: 12px;
        background: color-mix(
          in srgb,
          var(--error-bg) calc(var(--error-opacity) * 100%),
          transparent
        );
        border: 1px solid var(--error-border);
        color: var(--error);
        backdrop-filter: blur(var(--error-blur));
        -webkit-backdrop-filter: blur(var(--error-blur));
        opacity: var(--error-opacity);
        display: none;
      }

      .error.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="scene-banner" aria-hidden="true"></div>

      <div class="skin-bar">
        <div class="skin-bar-row">
          <div class="skin-controls">
            <button
              type="button"
              id="skin-cycle"
              class="skin-control skin-cycle"
              title="Cycle skins every 30 seconds"
              aria-pressed="false"
            >
              CYCLE
            </button>
            <button
              type="button"
              id="skin-fav-filter"
              class="skin-control skin-fav-filter"
              title="Show favorites only"
              aria-label="Show favorites only"
              aria-pressed="false"
            >
              <span aria-hidden="true">★</span>
            </button>
          </div>
          <div class="skin-scroll" id="skin-scroll" aria-label="UI skins"></div>
        </div>
      </div>

      <h1>YouTube Downloader</h1>
      <p>
        Paste a link to save to your Desktop: <strong>320 kbps MP3</strong>,
        <strong>max-quality MP4 video</strong>, a <strong>JPG thumbnail</strong>,
        or <strong>all three</strong>.
      </p>

      <form id="download-form">
        <label for="url">YouTube URL</label>
        <div class="url-field">
          <input
            id="url"
            name="url"
            type="text"
            placeholder="https://www.youtube.com/watch?v=..."
            required
            autocomplete="off"
          />
          <button
            type="button"
            id="url-clear"
            class="url-clear"
            aria-label="Clear URL"
            title="Clear"
          >
            ×
          </button>
        </div>
        <button type="submit" id="mp3-btn">Download MP3</button>
        <button type="button" id="video-btn">Download MP4</button>
        <button type="button" id="thumb-btn">Download Thumb</button>
        <button type="button" id="all-btn" class="all">Download ALL</button>
      </form>

      <section class="status" id="status" aria-live="polite">
        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="status-text" id="status-text">Preparing...</div>
      </section>

      <div class="result" id="result"></div>
      <div class="error" id="error"></div>
    </main>

    <script src="/youtube-url.js"></script>
    <script>
      const form = document.getElementById("download-form");
      const urlInput = document.getElementById("url");
      const urlClearBtn = document.getElementById("url-clear");
      const mp3Btn = document.getElementById("mp3-btn");
      const videoBtn = document.getElementById("video-btn");
      const thumbBtn = document.getElementById("thumb-btn");
      const allBtn = document.getElementById("all-btn");
      const actionButtons = [mp3Btn, videoBtn, thumbBtn, allBtn];
      const status = document.getElementById("status");
      const progressBar = document.getElementById("progress-bar");
      const statusText = document.getElementById("status-text");
      const result = document.getElementById("result");
      const errorBox = document.getElementById("error");

      let activeSource = null;
      let finished = false;

      function updateClearButton() {
        urlClearBtn.classList.toggle("visible", urlInput.value.length > 0);
      }

      function normalizeUrl(input) {
        return YouTubeUrl.normalizeYouTubeUrl(input);
      }

      function showError(message) {
        errorBox.textContent = message;
        errorBox.classList.add("visible");
      }

      function resetUi() {
        status.classList.remove("visible");
        result.classList.remove("visible");
        errorBox.classList.remove("visible");
        progressBar.style.width = "0%";
        statusText.textContent = "Preparing...";
        result.textContent = "";
        errorBox.textContent = "";
      }

      function setProgress(percent, message) {
        status.classList.add("visible");
        progressBar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
        statusText.textContent = message;
      }

      function setButtonsDisabled(disabled) {
        for (const button of actionButtons) {
          button.disabled = disabled;
        }
      }

      function phaseLabel(phase, kind) {
        switch (phase) {
          case "starting":
            return "Starting";
          case "download":
            if (kind === "video") return "Downloading video";
            if (kind === "thumb") return "Downloading thumbnail";
            return "Downloading";
          case "extract":
            return "Converting to MP3";
          case "merge":
            return "Merging video";
          case "done":
            return "Done";
          default:
            return "Working";
        }
      }

      function startDownload(kind) {
        const url = normalizeUrl(urlInput.value);
        if (!url || !YouTubeUrl.isValidYouTubeUrl(url)) {
          showError(
            "Please enter a valid YouTube link, video ID, or youtu.be URL.",
          );
          return;
        }

        urlInput.value = url;
        updateClearButton();

        if (activeSource) {
          activeSource.close();
          activeSource = null;
        }

        resetUi();
        setButtonsDisabled(true);
        finished = false;

        const source = new EventSource(
          `/api/download?url=${encodeURIComponent(url)}&kind=${encodeURIComponent(kind)}`,
        );
        activeSource = source;

        source.addEventListener("progress", (event) => {
          const data = JSON.parse(event.data);
          const activeKind = kind === "all" ? data.step : kind;
          const label = phaseLabel(data.phase, activeKind);
          const percent =
            typeof data.percent === "number"
              ? data.percent
              : data.phase === "extract" || data.phase === "merge"
                ? 100
                : 0;
          const stepDetail =
            kind === "all" && data.stepIndex
              ? ` (${data.stepIndex}/${data.stepTotal})`
              : "";
          const detail = data.message ? ` — ${data.message}` : "";
          setProgress(percent, `${label}${stepDetail}${detail}`);
        });

        source.addEventListener("complete", (event) => {
          finished = true;
          const data = JSON.parse(event.data);
          setProgress(100, "Saved to Desktop");

          if (Array.isArray(data.files)) {
            const fileList = data.files
              .map((file) => file.fileName)
              .join("<br>");
            result.innerHTML = `<strong>${data.title}</strong>${fileList}`;
          } else {
            result.innerHTML = `<strong>${data.title}</strong>${data.fileName}`;
          }

          result.classList.add("visible");
          source.close();
          activeSource = null;
          setButtonsDisabled(false);
        });

        source.addEventListener("failed", (event) => {
          finished = true;
          const data = JSON.parse(event.data);
          showError(data.message || "Download failed.");
          source.close();
          activeSource = null;
          setButtonsDisabled(false);
        });

        source.onerror = () => {
          if (finished || source.readyState === EventSource.CLOSED) return;
          showError("Connection lost. Please try again.");
          source.close();
          activeSource = null;
          setButtonsDisabled(false);
        };
      }

      urlInput.addEventListener("input", updateClearButton);

      urlClearBtn.addEventListener("click", () => {
        urlInput.value = "";
        updateClearButton();
        urlInput.focus();
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        startDownload("mp3");
      });

      videoBtn.addEventListener("click", () => {
        if (!urlInput.value.trim()) {
          urlInput.focus();
          return;
        }
        startDownload("video");
      });

      thumbBtn.addEventListener("click", () => {
        if (!urlInput.value.trim()) {
          urlInput.focus();
          return;
        }
        startDownload("thumb");
      });

      allBtn.addEventListener("click", () => {
        if (!urlInput.value.trim()) {
          urlInput.focus();
          return;
        }
        startDownload("all");
      });

      updateClearButton();
    </script>
    <script src="/skins.js"></script>
  </body>
</html>
